name: CI/CD with E2E Integration Tests & Monitoring (Cloud Run)

on:
  push:
    branches: [main]

permissions:
  checks: write
  contents: read

jobs:
  # ---------- PHASE 1: LINT (Static Analysis) ----------
  lint:
    name: 🔍 Lint & Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - run: flutter pub get

      - name: Run Flutter Analyze (Linting)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos --write=lint-results.txt || true

      - name: Upload Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint-results.txt

  # ---------- PHASE 2: UNIT TESTS (Mockito) ----------
  unit-test:
    name: 🧪 Unit Tests
    needs: lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - run: flutter pub get
      - run: flutter pub add --dev mockito build_runner

      - name: Generate mocks & run tests
        run: |
          mkdir -p test-results
          flutter pub run build_runner build --delete-conflicting-outputs
          flutter test test/ --no-pub --machine 1> test-results/unit-tests.json 2>/dev/null || true

      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: test-results/
          if-no-files-found: warn

      - name: Publish Unit Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'Unit Test Report'
          path: 'test-results/unit-tests.json'
          reporter: flutter-json
          fail-on-error: false

  # ---------- PHASE 3: INTEGRATION / E2E TESTS ----------
  e2e-test:
    name: 🧩 E2E / Integration Tests
    needs: lint
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - run: flutter pub get

      - name: Install Linux test dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgtk-3-dev xvfb

      - name: Run Integration / E2E Tests
        run: |
          mkdir -p test-results
          xvfb-run -a flutter test -d linux integration_test/app_test.dart --no-pub --machine 2>/dev/null | grep -E '^\{|^\[' > test-results/e2e-app.json || true
          xvfb-run -a flutter test -d linux integration_test/auth_flow_test.dart --no-pub --machine 2>/dev/null | grep -E '^\{|^\[' > test-results/e2e-auth.json || true
          xvfb-run -a flutter test -d linux integration_test/navigation_test.dart --no-pub --machine 2>/dev/null | grep -E '^\{|^\[' > test-results/e2e-nav.json || true

      - name: Upload E2E Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          if-no-files-found: warn

      - name: Publish E2E Test Report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: 'E2E Test Report'
          path: 'test-results/e2e-*.json'
          reporter: flutter-json
          fail-on-error: false

  # ---------- PHASE 4: BUILD & PUSH IMAGE (requires approval) ----------
  build-push:
    name: 🐳 Build & Push Image
    needs: [unit-test, e2e-test]
    if: always()
    runs-on: ubuntu-latest
    environment: build
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build & Push image
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/pso"
          docker build \
            --build-arg SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --build-arg SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            -t $IMAGE:${GITHUB_SHA} .
          docker push $IMAGE:${GITHUB_SHA}

  # ---------- PHASE 5: DEPLOY TO CLOUD RUN (requires approval) ----------
  deploy:
    name: 🚀 Deploy to Cloud Run
    needs: build-push
    if: always()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/pso"
          gcloud run deploy my-app-service \
            --image=$IMAGE:${GITHUB_SHA} \
            --region=${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --port=8080

  # ---------- PHASE 6: MONITORING (Uptime + Alert) ----------
  monitor:
    name: 📊 Setup Monitoring
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Create uptime check
        run: |
          SERVICE_URL=$(gcloud run services describe my-app-service \
            --region=${{ secrets.GCP_REGION }} \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)")

          # Extract the raw hostname by stripping the "https://" prefix
          HOST_URL=${SERVICE_URL#https://}

          # Create the uptime check using inline flags
          gcloud monitoring uptime create "Flutter Web App Health" \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --resource-type="uptime-url" \
            --resource-labels="host=$HOST_URL,project_id=${{ secrets.GCP_PROJECT_ID }}" \
            --protocol="https" \
            --path="/" \
            --port=443 \
            --timeout=10 \
            --period=1
